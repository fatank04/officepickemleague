[build]
  # Non-destructive: db push WITHOUT --accept-data-loss (a destructive schema change fails the build
  # loudly instead of silently dropping live data). seed.js no-ops when leagues already exist.
  command = "npx prisma db push && node scripts/seed.js && npm run build"

[build.environment]
  NODE_VERSION = "20"

[[plugins]]
  package = "@netlify/plugin-nextjs"
